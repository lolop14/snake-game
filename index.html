<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>贪吃蛇游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: "Microsoft YaHei", "SimHei", "PingFang SC", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}
.game-wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 10px;
}
.game-container {
    position: relative;
    background: #000;
    border: 3px solid #333;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
}
canvas { display: block; max-width: 100%; height: auto; }
.sidebar {
    background: #16213e;
    border-radius: 8px;
    padding: 20px;
    color: #fff;
    min-width: 260px;
    max-width: 280px;
}
.sidebar h3 {
    text-align: center;
    margin-bottom: 10px;
    color: #e94560;
    font-size: 16px;
    border-bottom: 1px solid #333;
    padding-bottom: 6px;
}
.sidebar .score-box {
    text-align: center;
    font-size: 30px;
    font-weight: bold;
    color: #0f0;
    margin-bottom: 2px;
}
.sidebar .player-name {
    text-align: center;
    font-size: 13px;
    color: #e94560;
    margin-bottom: 2px;
}
.sidebar .level-box {
    text-align: center;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 10px;
}

/* 状态 Buff 显示 */
.buff-list {
    margin-bottom: 10px;
    min-height: 22px;
}
.buff-tag {
    display: inline-block;
    padding: 2px 8px;
    margin: 2px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: bold;
    animation: buffPulse 0.8s ease-in-out infinite alternate;
}
.buff-wallpass  { background: #7c3aed; color: #fff; }
.buff-reverse   { background: #dc2626; color: #fff; animation-duration: 0.4s; }
.buff-mud       { background: #92400e; color: #fff; }
@keyframes buffPulse { from { opacity: 1; } to { opacity: 0.6; } }

/* 道具图例 */
.item-legend {
    margin-bottom: 10px;
    padding: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    font-size: 11px;
    color: #888;
    line-height: 1.8;
}
.item-legend span { margin-right: 2px; }
.item-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    vertical-align: middle;
    margin: 0 2px;
}

/* 榜单 Tab */
.leaderboard-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
}
.leaderboard-tab {
    flex: 1;
    padding: 5px 4px;
    font-size: 11px;
    border: 1px solid #333;
    border-radius: 4px;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    text-align: center;
}
.leaderboard-tab.active {
    background: #e94560;
    color: #fff;
    border-color: #e94560;
}
.leaderboard-tab:hover:not(.active) { color: #ccc; border-color: #555; }
.sidebar .leaderboard-list {
    list-style: none;
    max-height: 180px;
    overflow-y: auto;
}
.sidebar .leaderboard-list li {
    display: flex;
    justify-content: space-between;
    padding: 4px 7px;
    margin: 2px 0;
    background: #0f3460;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.4;
}
.sidebar .leaderboard-list li:nth-child(1) { color: #ffd700; }
.sidebar .leaderboard-list li:nth-child(2) { color: #c0c0c0; }
.sidebar .leaderboard-list li:nth-child(3) { color: #cd7f32; }
.sidebar .leaderboard-empty {
    text-align: center;
    color: #666;
    font-size: 12px;
    padding: 16px 0;
}
.leaderboard-note {
    margin-top: 6px;
    font-size: 10px;
    color: #555;
    text-align: center;
}
.refresh-btn {
    display: block;
    margin: 6px auto 0;
    padding: 4px 14px;
    font-size: 11px;
    border: 1px solid #444;
    border-radius: 4px;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-family: inherit;
}
.refresh-btn:hover { color: #fff; border-color: #777; }
.controls-hint {
    margin-top: 10px;
    font-size: 11px;
    color: #555;
    text-align: center;
}

/* 覆盖层 */
.overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
    overflow-y: auto;
    padding: 20px;
}
.overlay.hidden { display: none; }
.overlay .title { font-size: 32px; color: #e94560; margin-bottom: 8px; }
.overlay .subtitle { font-size: 14px; color: #ccc; margin-bottom: 18px; }

/* 昵称输入 */
.nickname-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 14px;
}
.nickname-wrap label { font-size: 13px; color: #aaa; margin-bottom: 6px; }
.nickname-input {
    width: 200px;
    padding: 8px 12px;
    font-size: 16px;
    text-align: center;
    border: 2px solid #444;
    border-radius: 6px;
    background: #111;
    color: #fff;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
}
.nickname-input:focus { border-color: #e94560; }
.nickname-error { font-size: 12px; color: #f66; margin-top: 4px; min-height: 18px; }

.overlay .over-score { font-size: 20px; color: #0f0; margin-bottom: 4px; }
.overlay .over-level { font-size: 14px; color: #aaa; margin-bottom: 12px; }
.overlay .over-leaderboard { width: 280px; margin-bottom: 12px; }
.overlay .over-leaderboard h4 {
    text-align: center; color: #e94560; margin-bottom: 6px; font-size: 14px;
}
.overlay .over-leaderboard ol {
    list-style: none; font-size: 12px;
    max-height: 160px; overflow-y: auto;
}
.overlay .over-leaderboard ol li {
    display: flex; justify-content: space-between;
    padding: 3px 8px; margin: 2px 0;
    background: rgba(255,255,255,0.08); border-radius: 4px;
    line-height: 1.4;
}
.overlay .over-leaderboard ol li:nth-child(1) { color: #ffd700; }
.overlay .over-leaderboard ol li:nth-child(2) { color: #c0c0c0; }
.overlay .over-leaderboard ol li:nth-child(3) { color: #cd7f32; }
.overlay .over-nickname { font-size: 14px; color: #e94560; margin-bottom: 4px; }

.btn {
    padding: 10px 30px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-start { background: #e94560; color: #fff; }
.btn-start:hover:not(:disabled) { background: #c73a52; }
.btn-restart { background: #0f3460; color: #fff; margin-bottom: 8px; }
.btn-restart:hover:not(:disabled) { background: #1a4a7a; }
.overlay .hint { font-size: 12px; color: #666; margin-top: 10px; }

/* Toast */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
    pointer-events: none;
    transition: opacity 0.3s;
    font-family: "Microsoft YaHei","SimHei","PingFang SC",Arial,sans-serif;
}
.toast.hidden { opacity: 0; }
.spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ========== 虚拟方向键 ========== */
.dpad { display: none; margin-top: 16px; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.dpad-grid {
    display: grid;
    grid-template-columns: 70px 70px 70px;
    grid-template-rows: 70px 70px 70px;
    gap: 4px;
    justify-content: center;
}
.dpad-btn {
    width: 70px; height: 70px;
    border: 2px solid #444;
    border-radius: 10px;
    background: #1a1a3e;
    color: #ccc;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}
.dpad-btn:active, .dpad-btn.active {
    background: #e94560; color: #fff;
    transform: scale(0.92); border-color: #e94560;
}
.dpad-empty { background: transparent; border: none; pointer-events: none; }
.dpad-up    { grid-column: 2; grid-row: 1; }
.dpad-left  { grid-column: 1; grid-row: 2; }
.dpad-center{ grid-column: 2; grid-row: 2; }
.dpad-right { grid-column: 3; grid-row: 2; }
.dpad-down  { grid-column: 2; grid-row: 3; }

/* ========== 手机端响应式 ========== */
@media (max-width: 768px) {
    .game-wrapper { flex-direction: column; align-items: center; gap: 12px; padding: 8px; }
    .game-container { max-width: 95vw; border-width: 2px; }
    canvas { max-width: 100%; height: auto; }
    .sidebar { width: 100%; max-width: 95vw; min-width: auto; padding: 12px; order: 1; }
    .sidebar h3 { font-size: 13px; margin-bottom: 6px; padding-bottom: 4px; }
    .sidebar .score-box { font-size: 22px; }
    .sidebar .level-box { font-size: 12px; margin-bottom: 8px; }
    .sidebar .leaderboard-list { max-height: 130px; }
    .sidebar .leaderboard-list li { padding: 3px 5px; font-size: 10px; }
    .controls-hint { display: none; }
    .dpad { display: block; }
    .overlay .title { font-size: 24px; }
    .overlay .subtitle { font-size: 13px; margin-bottom: 14px; }
    .overlay .over-score { font-size: 17px; }
    .overlay .over-level { font-size: 12px; }
    .overlay .over-leaderboard { width: 240px; }
    .overlay .over-leaderboard ol { max-height: 120px; font-size: 11px; }
    .btn { padding: 8px 24px; font-size: 14px; }
    .nickname-input { width: 170px; font-size: 14px; }
}
@media (max-width: 380px) {
    .dpad-grid { grid-template-columns: 55px 55px 55px; grid-template-rows: 55px 55px 55px; gap: 3px; }
    .dpad-btn { width: 55px; height: 55px; font-size: 20px; }
}
</style>
</head>
<body>

<div class="game-wrapper">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <h3>📊 游戏信息</h3>
        <div class="score-box" id="sidebarScore">0</div>
        <div class="player-name" id="sidebarPlayer"></div>
        <div class="level-box">等级: <span id="sidebarLevel">1</span></div>

        <!-- 状态 Buff -->
        <div class="buff-list" id="buffList"></div>

        <!-- 道具图例 -->
        <div class="item-legend">
            <span><span class="item-dot" style="background:#f00"></span>普通</span>
            <span><span class="item-dot" style="background:#ffd700"></span>金+30</span>
            <span><span class="item-dot" style="background:#0ff"></span>减速</span>
            <span><span class="item-dot" style="background:#a855f7"></span>穿墙</span>
            <span><span class="item-dot" style="background:#ef4444"></span>颠倒</span>
            <span><span class="item-dot" style="background:#92400e"></span>泥沼</span>
        </div>

        <!-- 榜单 Tab -->
        <div class="leaderboard-tabs">
            <button class="leaderboard-tab active" data-tab="cloud">☁️ 云端总榜</button>
            <button class="leaderboard-tab" data-tab="local">💻 本地个人</button>
        </div>
        <ul class="leaderboard-list" id="sidebarLeaderboard">
            <li class="leaderboard-empty">加载中...</li>
        </ul>
        <div class="leaderboard-note" id="leaderboardNote"></div>
        <button class="refresh-btn" id="btnRefresh">🔄 刷新榜单</button>
        <div class="controls-hint">↑↓←→ / WASD 控制</div>
    </div>

    <!-- 游戏画布 -->
    <div class="game-container" id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- 开始覆盖层 -->
        <div class="overlay" id="startOverlay">
            <div class="title">🐍 贪吃蛇</div>
            <div class="subtitle">方向键 / 虚拟按键控制 · 彩色方块是特殊道具</div>
            <div class="nickname-wrap">
                <label for="nicknameInput">请输入你的昵称</label>
                <input type="text" class="nickname-input" id="nicknameInput"
                       placeholder="2-10个字符" maxlength="10" autocomplete="off">
                <div class="nickname-error" id="nicknameError"></div>
            </div>
            <button class="btn btn-start" id="btnStart">开始游戏</button>
        </div>

        <!-- 结束覆盖层 -->
        <div class="overlay hidden" id="gameOverOverlay">
            <div class="title">游戏结束！</div>
            <div class="over-nickname" id="overNickname"></div>
            <div class="over-score" id="overScore">最终分数: 0</div>
            <div class="over-level" id="overLevel">等级: 1</div>
            <div class="over-leaderboard" id="overCloudBoard">
                <h4>☁️ 云端总榜 TOP20</h4>
                <ol id="overCloudList"></ol>
            </div>
            <div class="over-leaderboard" id="overLocalBoard">
                <h4>💻 本地个人榜 TOP5</h4>
                <ol id="overLocalList"></ol>
            </div>
            <button class="btn btn-restart" id="btnRestart">🔄 重新开始 (R)</button>
            <div class="hint">按 R 键重新开始</div>
        </div>
    </div>

    <!-- 虚拟方向键 -->
    <div class="dpad" id="dpad">
        <div class="dpad-grid">
            <button class="dpad-btn dpad-up"    data-dir="up">▲</button>
            <button class="dpad-btn dpad-left"  data-dir="left">◀</button>
            <button class="dpad-btn dpad-empty dpad-center"></button>
            <button class="dpad-btn dpad-right" data-dir="right">▶</button>
            <button class="dpad-btn dpad-down"  data-dir="down">▼</button>
        </div>
    </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
(function() {
    // ==================== 游戏配置 ====================
    const WIDTH = 640;
    const HEIGHT = 480;
    const CELL_SIZE = 20;
    const COLS = WIDTH / CELL_SIZE;
    const ROWS = HEIGHT / CELL_SIZE;

    // ================================================
    //  全自动云端排行榜模块 - JSONBin.io 配置
    // ================================================
    const JSONBIN_BIN_ID = '6a16b8b2f47d5c455c3c53e3';
    const JSONBIN_API_KEY = '$2a$10$SxtA6rQsL4UJoaIz2qWdLOEz5/qFEeusCOW7ufWyLseRM4aQodKKG';
    const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID;
    const JSONBIN_HEADERS = {
        'X-Master-Key': JSONBIN_API_KEY,
        'Content-Type': 'application/json'
    };
    const LOCAL_LEADERBOARD_KEY = 'snake_local_leaderboard_v3';
    const LOCAL_NICKNAME_KEY = 'snake_nickname';

    // ================================================
    //  特殊道具系统 - 配置
    // ================================================
    // 道具类型枚举
    const ITEM_TYPES = {
        GOLD:     { id:'gold',     name:'金色食物', color:'#ffd700', icon:'$',  score:30, speedDelta:0,  prob:0.15, lifetime:7000,  desc:'+30分不加速' },
        SLOW:     { id:'slow',     name:'减速道具', color:'#00e5ff', icon:'❄', score:0,  speedDelta:-3, prob:0.10, lifetime:6000,  desc:'速度-3' },
        WALLPASS: { id:'wallpass', name:'穿墙道具', color:'#a855f7', icon:'⟳', score:0,  speedDelta:0,  prob:0.05, lifetime:5000,  desc:'5秒穿墙', effectDuration:5000 },
        REVERSE:  { id:'reverse',  name:'颠倒道具', color:'#ef4444', icon:'↺', score:0,  speedDelta:0,  prob:0.08, lifetime:5000,  desc:'3秒方向颠倒', effectDuration:3000 },
        MUD:      { id:'mud',      name:'泥沼陷阱', color:'#d97706', icon:'≈', score:0,  speedDelta:0,  prob:0.10, lifetime:7000,  desc:'3×3减速区8秒', zoneDuration:8000 }
    };
    const ITEM_COOLDOWN = 10000; // 道具消失后10秒冷却

    // ==================== DOM 元素 ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const overScoreEl = document.getElementById('overScore');
    const overLevelEl = document.getElementById('overLevel');
    const overNicknameEl = document.getElementById('overNickname');
    const overCloudList = document.getElementById('overCloudList');
    const overLocalList = document.getElementById('overLocalList');
    const sidebarScoreEl = document.getElementById('sidebarScore');
    const sidebarLevelEl = document.getElementById('sidebarLevel');
    const sidebarPlayerEl = document.getElementById('sidebarPlayer');
    const sidebarLeaderboardEl = document.getElementById('sidebarLeaderboard');
    const leaderboardNoteEl = document.getElementById('leaderboardNote');
    const nicknameInput = document.getElementById('nicknameInput');
    const nicknameErrorEl = document.getElementById('nicknameError');
    const dpad = document.getElementById('dpad');
    const toastEl = document.getElementById('toast');
    const buffListEl = document.getElementById('buffList');

    // ==================== 游戏状态 ====================
    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let score = 0;
    let speed = 10;
    let gameRunning = false;
    let gameStarted = false;
    let animationId = null;
    let playerNickname = '';
    let cloudOnline = false;
    let currentLeaderboardTab = 'cloud';

    // ---- 道具系统状态 ----
    let specialItem = null;           // 当前屏幕上的特殊道具 { type, x, y, spawnTime }
    let itemCooldownUntil = 0;        // 冷却结束时间戳
    let wallPassUntil = 0;            // 穿墙效果结束时间戳
    let reverseUntil = 0;             // 颠倒效果结束时间戳
    let mudZones = [];                // 泥沼区域 [{x, y, until}]

    // ==================== Toast ====================
    let toastTimer = null;
    function showToast(msg, duration) {
        duration = duration || 2000;
        if (toastTimer) clearTimeout(toastTimer);
        toastEl.textContent = msg;
        toastEl.classList.remove('hidden');
        toastTimer = setTimeout(function() { toastEl.classList.add('hidden'); }, duration);
    }

    // ================================================
    //  全自动云端排行榜模块 - 昵称校验
    // ================================================
    function validateNickname(name) {
        if (!name || name.trim() === '') return '昵称不能为空';
        if (name.trim().length < 2) return '昵称至少2个字符';
        if (name.trim().length > 10) return '昵称最多10个字符';
        if (!/^[\u4e00-\u9fa5a-zA-Z0-9_ ]+$/.test(name.trim())) return '昵称含非法字符，仅支持中英文、数字、下划线';
        if (name.trim().toLowerCase() === 'system') return '昵称不能为 system';
        return null;
    }
    function getValidatedNickname() {
        var raw = nicknameInput.value;
        var err = validateNickname(raw);
        if (err) { nicknameErrorEl.textContent = err; return null; }
        nicknameErrorEl.textContent = '';
        return raw.trim();
    }
    function restoreNickname() {
        try { var s = localStorage.getItem(LOCAL_NICKNAME_KEY); if (s) nicknameInput.value = s; } catch(e) {}
    }
    function saveNickname(name) { try { localStorage.setItem(LOCAL_NICKNAME_KEY, name); } catch(e) {} }

    // ================================================
    //  全自动云端排行榜模块 - 本地存储
    // ================================================
    function loadLocalLeaderboard() {
        try { var d = localStorage.getItem(LOCAL_LEADERBOARD_KEY); return d ? JSON.parse(d) : []; } catch(e) { return []; }
    }
    function saveLocalLeaderboard(list) {
        var s = list.sort(function(a,b){ return b.score - a.score; }).slice(0, 5);
        try { localStorage.setItem(LOCAL_LEADERBOARD_KEY, JSON.stringify(s)); } catch(e) {}
    }
    function addToLocalLeaderboard(nickname, score, level) {
        var list = loadLocalLeaderboard();
        list.push({ nickname: nickname, score: score, level: level, timestamp: new Date().toISOString() });
        saveLocalLeaderboard(list);
    }

    // ================================================
    //  全自动云端排行榜模块 - JSONBin 读写
    // ================================================
    async function fetchCloudLeaderboard() {
        var resp = await fetch(JSONBIN_URL + '/latest', { method: 'GET', headers: { 'X-Master-Key': JSONBIN_API_KEY } });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var json = await resp.json();
        var data = json.record;
        if (!Array.isArray(data)) data = [];
        data = data.filter(function(e) { return e.nickname && e.nickname.toLowerCase() !== 'system'; });
        data.sort(function(a,b) { return b.score - a.score; });
        return data.slice(0, 20);
    }
    async function submitToCloud(nickname, score, level) {
        var resp = await fetch(JSONBIN_URL + '/latest', { method: 'GET', headers: { 'X-Master-Key': JSONBIN_API_KEY } });
        var json = await resp.json();
        var list = json.record; if (!Array.isArray(list)) list = [];
        list = list.filter(function(e) { return e.nickname && e.nickname.toLowerCase() !== 'system'; });
        var idx = -1;
        for (var i = 0; i < list.length; i++) { if (list[i].nickname === nickname) { idx = i; break; } }
        var entry = { nickname: nickname, score: score, level: level, timestamp: new Date().toISOString() };
        if (idx >= 0) { if (score > list[idx].score) list[idx] = entry; }
        else { list.push(entry); }
        var putResp = await fetch(JSONBIN_URL, { method: 'PUT', headers: JSONBIN_HEADERS, body: JSON.stringify(list) });
        if (!putResp.ok) throw new Error('PUT HTTP ' + putResp.status);
    }
    async function loadCloudLeaderboardSafe() {
        try { var d = await fetchCloudLeaderboard(); cloudOnline = true; return d; }
        catch(e) { console.warn('[云端] 网络不可用:', e.message); cloudOnline = false; return null; }
    }
    async function submitToCloudSafe(nickname, score, level) {
        try { await submitToCloud(nickname, score, level); cloudOnline = true; showToast('✅ 分数已同步到云端'); }
        catch(e) { console.warn('[云端] 提交失败:', e.message); cloudOnline = false; showToast('⚠️ 网络异常，已保存本地'); }
    }

    // ================================================
    //  全自动云端排行榜模块 - UI 渲染
    // ================================================
    function formatTime(isoStr) {
        try { var d = new Date(isoStr); var m = d.getMonth()+1; var day = d.getDate(); var h = d.getHours(); var min = d.getMinutes(); if (min<10) min='0'+min; return m+'/'+day+' '+h+':'+min; } catch(e) { return ''; }
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>'); }
    function renderLeaderboardList(container, data, isCloud) {
        container.innerHTML = '';
        if (!data || data.length === 0) {
            container.innerHTML = '<li class="leaderboard-empty">' + (isCloud ? '暂无云端数据' : '暂无本地记录') + '</li>';
            return;
        }
        var items = data.slice(0, isCloud ? 20 : 5);
        items.forEach(function(entry, i) {
            var li = document.createElement('li');
            var timeStr = entry.timestamp ? formatTime(entry.timestamp) : '';
            li.innerHTML = '<span>' + (i+1) + '. ' + escapeHtml(entry.nickname) + '</span>' +
                '<span>' + entry.score + '分 Lv' + entry.level + (timeStr ? ' <small style="color:#666">' + timeStr + '</small>' : '') + '</span>';
            container.appendChild(li);
        });
    }
    async function refreshSidebarLeaderboard() {
        sidebarLeaderboardEl.innerHTML = '<li class="leaderboard-empty"><span class="spinner"></span>加载中...</li>';
        if (currentLeaderboardTab === 'cloud') {
            var cloudData = await loadCloudLeaderboardSafe();
            if (cloudData) { renderLeaderboardList(sidebarLeaderboardEl, cloudData, true); leaderboardNoteEl.textContent = '☁️ 云端实时数据 · TOP20'; }
            else { renderLeaderboardList(sidebarLeaderboardEl, loadLocalLeaderboard(), false); leaderboardNoteEl.textContent = '⚠️ 网络不可用，显示本地数据'; }
        } else {
            renderLeaderboardList(sidebarLeaderboardEl, loadLocalLeaderboard(), false);
            leaderboardNoteEl.textContent = '💻 本设备记录 · 最多5条';
        }
    }
    async function refreshGameOverLeaderboards() {
        overCloudList.innerHTML = '<li class="leaderboard-empty"><span class="spinner"></span>加载中...</li>';
        var cloudData = await loadCloudLeaderboardSafe();
        renderLeaderboardList(overCloudList, cloudData, true);
        renderLeaderboardList(overLocalList, loadLocalLeaderboard(), false);
        overNicknameEl.textContent = '玩家: ' + playerNickname;
    }
    async function updateSidebar() {
        var level = speed - 9;
        sidebarScoreEl.textContent = score;
        sidebarLevelEl.textContent = level;
        sidebarPlayerEl.textContent = playerNickname ? '玩家: ' + playerNickname : '';
        updateBuffDisplay();
        await refreshSidebarLeaderboard();
    }
    async function showGameOverOverlayAsync() {
        var level = speed - 9;
        overScoreEl.textContent = '最终分数: ' + score;
        overLevelEl.textContent = '等级: ' + level;
        overNicknameEl.textContent = '玩家: ' + playerNickname;
        addToLocalLeaderboard(playerNickname, score, level);
        await submitToCloudSafe(playerNickname, score, level);
        await refreshGameOverLeaderboards();
        gameOverOverlay.classList.remove('hidden');
    }
    function hideOverlays() { startOverlay.classList.add('hidden'); gameOverOverlay.classList.add('hidden'); }

    // ================================================
    //  特殊道具系统 - Buff 状态显示
    // ================================================
    function updateBuffDisplay() {
        buffListEl.innerHTML = '';
        var now = Date.now();
        if (wallPassUntil > now) {
            var left = Math.ceil((wallPassUntil - now) / 1000);
            buffListEl.innerHTML += '<span class="buff-tag buff-wallpass">🟣 穿墙 ' + left + 's</span>';
        }
        if (reverseUntil > now) {
            var left = Math.ceil((reverseUntil - now) / 1000);
            buffListEl.innerHTML += '<span class="buff-tag buff-reverse">🔴 颠倒 ' + left + 's</span>';
        }
        if (isInMud()) {
            buffListEl.innerHTML += '<span class="buff-tag buff-mud">⬛ 泥沼减速</span>';
        }
    }

    // ================================================
    //  特殊道具系统 - 道具生成
    // ================================================
    function trySpawnSpecialItem(now) {
        // 已有道具或冷却中，不生成
        if (specialItem) return;
        if (now < itemCooldownUntil) return;

        // 按概率随机选择道具类型
        var roll = Math.random();
        var cumulative = 0;
        var chosen = null;
        var types = Object.values(ITEM_TYPES);
        for (var i = 0; i < types.length; i++) {
            cumulative += types[i].prob;
            if (roll < cumulative) { chosen = types[i]; break; }
        }
        if (!chosen) return;

        // 找一个不在蛇身上、不在食物上的位置
        var attempts = 0;
        while (attempts < 200) {
            var ix = Math.floor(Math.random() * COLS) * CELL_SIZE;
            var iy = Math.floor(Math.random() * ROWS) * CELL_SIZE;
            var onSnake = snake.some(function(s) { return s.x === ix && s.y === iy; });
            var onFood = (food.x === ix && food.y === iy);
            if (!onSnake && !onFood) {
                specialItem = { type: chosen, x: ix, y: iy, spawnTime: now };
                return;
            }
            attempts++;
        }
    }

    function clearSpecialItem() {
        specialItem = null;
        itemCooldownUntil = Date.now() + ITEM_COOLDOWN;
    }

    // ================================================
    //  特殊道具系统 - 效果应用
    // ================================================
    function applyItemEffect(itemType) {
        var now = Date.now();
        var name = itemType.name;
        showToast(name + ': ' + itemType.desc, 1500);

        switch (itemType.id) {
            case 'gold':
                score += itemType.score;
                break;
            case 'slow':
                speed = Math.max(8, speed + itemType.speedDelta);
                break;
            case 'wallpass':
                wallPassUntil = now + itemType.effectDuration;
                break;
            case 'reverse':
                reverseUntil = now + itemType.effectDuration;
                break;
            case 'mud':
                // 在蛇头周围生成 3×3 泥沼区
                var head = snake[0];
                var hx = Math.round(head.x / CELL_SIZE);
                var hy = Math.round(head.y / CELL_SIZE);
                // 清除重叠旧泥沼
                mudZones = mudZones.filter(function(m) { return m.until > now; });
                for (var dx = -1; dx <= 1; dx++) {
                    for (var dy = -1; dy <= 1; dy++) {
                        var mx = (hx + dx) * CELL_SIZE;
                        var my = (hy + dy) * CELL_SIZE;
                        if (mx >= 0 && mx < WIDTH && my >= 0 && my < HEIGHT) {
                            // 去重
                            if (!mudZones.some(function(m) { return m.x === mx && m.y === my; })) {
                                mudZones.push({ x: mx, y: my, until: now + itemType.zoneDuration });
                            }
                        }
                    }
                }
                break;
        }
    }

    function isInMud() {
        var now = Date.now();
        var head = snake[0];
        if (!head) return false;
        return mudZones.some(function(m) { return m.x === head.x && m.y === head.y && m.until > now; });
    }

    function getEffectiveSpeed() {
        return isInMud() ? Math.max(4, Math.floor(speed / 2)) : speed;
    }

    // ==================== 方向设置（统一入口） ====================
    function setDirection(dx, dy) {
        if (!gameRunning) return;

        // 如果处于颠倒状态，翻转方向
        if (reverseUntil > Date.now()) {
            dx = -dx;
            dy = -dy;
        }

        // 防止反向移动（基于实际当前方向）
        if (dx !== 0) {
            if (direction.x === -dx) return;
        } else {
            if (direction.y === -dy) return;
        }
        nextDirection = { x: dx, y: dy };
    }

    // ==================== 食物生成 ====================
    function generateFood() {
        while (true) {
            var x = Math.floor(Math.random() * COLS) * CELL_SIZE;
            var y = Math.floor(Math.random() * ROWS) * CELL_SIZE;
            var onSnake = snake.some(function(s) { return s.x === x && s.y === y; });
            var onItem = specialItem && specialItem.x === x && specialItem.y === y;
            if (!onSnake && !onItem) return { x: x, y: y };
        }
    }

    // ==================== 绘制 ====================
    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        // 网格线
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 0.5;
        for (var x = 0; x <= WIDTH; x += CELL_SIZE) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, HEIGHT); ctx.stroke();
        }
        for (var y = 0; y <= HEIGHT; y += CELL_SIZE) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WIDTH, y); ctx.stroke();
        }

        // 泥沼区域（先画，在蛇下面）
        var now = Date.now();
        mudZones.forEach(function(m) {
            if (m.until <= now) return;
            var alpha = Math.min(0.5, (m.until - now) / 3000 * 0.5);
            ctx.fillStyle = 'rgba(139, 92, 10, ' + alpha + ')';
            ctx.fillRect(m.x, m.y, CELL_SIZE, CELL_SIZE);
            // 泥沼纹理
            ctx.fillStyle = 'rgba(100, 70, 10, ' + (alpha * 0.7) + ')';
            ctx.fillRect(m.x + 2, m.y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
        });

        // 蛇
        snake.forEach(function(seg, i) {
            if (i === 0) {
                // 蛇头：穿墙状态闪烁金色边框
                if (wallPassUntil > now) {
                    var flicker = Math.sin(now / 100) > 0;
                    ctx.fillStyle = flicker ? '#0f0' : '#ffd700';
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 2;
                    ctx.fillRect(seg.x + 1, seg.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.strokeRect(seg.x, seg.y, CELL_SIZE, CELL_SIZE);
                    ctx.lineWidth = 0.5;
                } else if (reverseUntil > now) {
                    // 颠倒状态闪烁红色边框
                    var rFlicker = Math.sin(now / 80) > 0;
                    ctx.fillStyle = rFlicker ? '#0f0' : '#f66';
                    ctx.strokeStyle = '#f44';
                    ctx.lineWidth = 2;
                    ctx.fillRect(seg.x + 1, seg.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.strokeRect(seg.x, seg.y, CELL_SIZE, CELL_SIZE);
                    ctx.lineWidth = 0.5;
                } else {
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(seg.x + 1, seg.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                }
            } else {
                ctx.fillStyle = '#00f';
                ctx.fillRect(seg.x + 1, seg.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            }
        });

        // 普通食物
        ctx.fillStyle = '#f00';
        ctx.fillRect(food.x + 1, food.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);

        // 特殊道具（带倒计时闪烁）
        if (specialItem) {
            var item = specialItem;
            var elapsed = now - item.spawnTime;
            var remaining = item.type.lifetime - elapsed;
            // 最后2秒快速闪烁
            var blink = remaining > 2000 || Math.floor(now / 200) % 2 === 0;

            if (blink) {
                // 背景色块
                ctx.fillStyle = item.type.color;
                ctx.fillRect(item.x + 1, item.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);

                // 内部图标
                ctx.fillStyle = '#000';
                ctx.font = 'bold ' + (CELL_SIZE - 4) + 'px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.type.icon, item.x + CELL_SIZE/2, item.y + CELL_SIZE/2 + 1);

                // 倒计时进度条（底部细条）
                var progress = remaining / item.type.lifetime;
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillRect(item.x + 2, item.y + CELL_SIZE - 4, (CELL_SIZE - 4) * progress, 2);
            }
        }
    }

    // ==================== 游戏循环 ====================
    let lastTime = 0;

    function loop(timestamp) {
        if (!gameRunning) return;
        if (!lastTime) lastTime = timestamp;

        var effSpeed = getEffectiveSpeed();
        var interval = 1000 / effSpeed;

        if (timestamp - lastTime >= interval) {
            lastTime = timestamp;
            update(timestamp);
        }

        draw();
        animationId = requestAnimationFrame(loop);
    }

    function update(now) {
        direction = { x: nextDirection.x, y: nextDirection.y };
        var head = snake[0];
        var newHead = {
            x: head.x + direction.x * CELL_SIZE,
            y: head.y + direction.y * CELL_SIZE
        };

        // ---- 碰撞检测 ----
        if (wallPassUntil > now) {
            // 穿墙模式：环绕地图
            if (newHead.x < 0) newHead.x = WIDTH - CELL_SIZE;
            else if (newHead.x >= WIDTH) newHead.x = 0;
            if (newHead.y < 0) newHead.y = HEIGHT - CELL_SIZE;
            else if (newHead.y >= HEIGHT) newHead.y = 0;
        } else {
            // 正常模式：撞墙死亡
            if (newHead.x < 0 || newHead.x >= WIDTH || newHead.y < 0 || newHead.y >= HEIGHT) {
                endGame(); return;
            }
        }

        // 撞自己死亡（穿墙不能豁免）
        if (snake.some(function(seg) { return seg.x === newHead.x && seg.y === newHead.y; })) {
            endGame(); return;
        }

        snake.unshift(newHead);

        // ---- 道具碰撞检测 ----
        var ateFood = (newHead.x === food.x && newHead.y === food.y);
        var ateItem = specialItem && newHead.x === specialItem.x && newHead.y === specialItem.y;

        if (ateFood) {
            score += 10;
            speed = Math.min(speed + 1, 25);
            food = generateFood();
            // 吃食物后尝试生成道具
            trySpawnSpecialItem(now);
            var lv = speed - 9;
            sidebarScoreEl.textContent = score;
            sidebarLevelEl.textContent = lv;
            updateBuffDisplay();
        } else {
            snake.pop();
        }

        // 吃道具
        if (ateItem) {
            var itemType = specialItem.type;
            clearSpecialItem();
            applyItemEffect(itemType);
            sidebarScoreEl.textContent = score;
            sidebarLevelEl.textContent = speed - 9;
            updateBuffDisplay();
        }

        // 道具超时消失
        if (specialItem) {
            if (now - specialItem.spawnTime >= specialItem.type.lifetime) {
                clearSpecialItem();
                updateBuffDisplay();
            }
        }

        // 清理过期泥沼
        mudZones = mudZones.filter(function(m) { return m.until > now; });

        // 过期效果自动清除
        if (wallPassUntil && wallPassUntil <= now) { wallPassUntil = 0; updateBuffDisplay(); }
        if (reverseUntil && reverseUntil <= now) { reverseUntil = 0; updateBuffDisplay(); }

        // 冷却结束后尝试生成（如果还没道具）
        if (!specialItem && now >= itemCooldownUntil) {
            trySpawnSpecialItem(now);
        }
    }

    async function endGame() {
        gameRunning = false;
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
        lastTime = 0;
        // 清除所有道具状态
        specialItem = null; itemCooldownUntil = 0;
        wallPassUntil = 0; reverseUntil = 0; mudZones = [];
        updateBuffDisplay();
        await showGameOverOverlayAsync();
        await refreshSidebarLeaderboard();
    }

    // ==================== 游戏初始化 ====================
    async function initGame() {
        var nick = getValidatedNickname();
        if (!nick) { nicknameInput.focus(); return; }
        playerNickname = nick;
        saveNickname(nick);

        var startX = Math.floor(COLS / 2) * CELL_SIZE;
        var startY = Math.floor(ROWS / 2) * CELL_SIZE;
        snake = [
            { x: startX, y: startY },
            { x: startX - CELL_SIZE, y: startY },
            { x: startX - 2 * CELL_SIZE, y: startY }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        speed = 10;
        specialItem = null;
        itemCooldownUntil = 0;
        wallPassUntil = 0;
        reverseUntil = 0;
        mudZones = [];
        food = generateFood();
        gameRunning = true;
        gameStarted = true;
        lastTime = 0;

        sidebarPlayerEl.textContent = '玩家: ' + playerNickname;
        updateBuffDisplay();
        hideOverlays();
        draw();

        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
    }

    // ==================== 键盘事件 ====================
    document.addEventListener('keydown', function(e) {
        if (document.activeElement === nicknameInput) return;
        if (!gameRunning) {
            if (e.key === 'r' || e.key === 'R') {
                if (!startOverlay.classList.contains('hidden') || !gameOverOverlay.classList.contains('hidden')) {
                    if (gameStarted) initGame();
                }
            }
            return;
        }
        switch (e.key) {
            case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); e.preventDefault(); break;
            case 'ArrowDown': case 's': case 'S': setDirection(0, 1); e.preventDefault(); break;
            case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); e.preventDefault(); break;
            case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); e.preventDefault(); break;
        }
    });

    // ==================== 虚拟方向键 ====================
    dpad.querySelectorAll('.dpad-btn[data-dir]').forEach(function(btn) {
        btn.addEventListener('pointerdown', function(e) {
            e.preventDefault(); e.stopPropagation();
            btn.classList.add('active');
            var dir = btn.getAttribute('data-dir');
            switch (dir) {
                case 'up': setDirection(0, -1); break;
                case 'down': setDirection(0, 1); break;
                case 'left': setDirection(-1, 0); break;
                case 'right': setDirection(1, 0); break;
            }
        });
        btn.addEventListener('pointerup', function(e) { e.preventDefault(); btn.classList.remove('active'); });
        btn.addEventListener('pointerleave', function(e) { btn.classList.remove('active'); });
        btn.addEventListener('pointercancel', function(e) { btn.classList.remove('active'); });
    });
    dpad.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

    // ==================== 画布自适应 ====================
    function resizeCanvas() {
        if (window.innerWidth <= 768) {
            var maxW = Math.min(window.innerWidth - 16, 640);
            canvas.style.width = maxW + 'px';
            canvas.style.height = (HEIGHT * maxW / WIDTH) + 'px';
        } else {
            canvas.style.width = ''; canvas.style.height = '';
        }
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ==================== 按钮事件 ====================
    document.getElementById('btnStart').addEventListener('click', function() { initGame(); });
    document.getElementById('btnRestart').addEventListener('click', function() { initGame(); });
    document.getElementById('btnRefresh').addEventListener('click', function() { refreshSidebarLeaderboard(); showToast('🔄 榜单已刷新'); });
    document.querySelectorAll('.leaderboard-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.leaderboard-tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            currentLeaderboardTab = tab.getAttribute('data-tab');
            refreshSidebarLeaderboard();
        });
    });
    nicknameInput.addEventListener('input', function() {
        nicknameErrorEl.textContent = validateNickname(nicknameInput.value) || '';
    });
    nicknameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') initGame(); });

    // ==================== 初始加载 ====================
    (async function initLoad() {
        restoreNickname();
        await refreshSidebarLeaderboard();
        updateBuffDisplay();
        draw();
    })();
})();
</script>
