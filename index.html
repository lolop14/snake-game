<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>贪吃蛇游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: "Microsoft YaHei", "SimHei", "PingFang SC", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}
.game-wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 10px;
}
.game-container {
    position: relative;
    background: #000;
    border: 3px solid #333;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
}
canvas { display: block; max-width: 100%; height: auto; }
.sidebar {
    background: #16213e;
    border-radius: 8px;
    padding: 20px;
    color: #fff;
    min-width: 200px;
}
.sidebar h3 {
    text-align: center;
    margin-bottom: 12px;
    color: #e94560;
    font-size: 18px;
    border-bottom: 1px solid #333;
    padding-bottom: 8px;
}
.sidebar .score-box {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #0f0;
    margin-bottom: 8px;
}
.sidebar .level-box {
    text-align: center;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 16px;
}
.sidebar .leaderboard-list {
    list-style: none;
}
.sidebar .leaderboard-list li {
    display: flex;
    justify-content: space-between;
    padding: 6px 8px;
    margin: 3px 0;
    background: #0f3460;
    border-radius: 4px;
    font-size: 13px;
}
.sidebar .leaderboard-list li:nth-child(1) { color: #ffd700; }
.sidebar .leaderboard-list li:nth-child(2) { color: #c0c0c0; }
.sidebar .leaderboard-list li:nth-child(3) { color: #cd7f32; }
.sidebar .leaderboard-empty {
    text-align: center;
    color: #666;
    font-size: 13px;
    padding: 20px 0;
}
.controls-hint {
    margin-top: 16px;
    font-size: 12px;
    color: #666;
    text-align: center;
}
.overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
}
.overlay.hidden { display: none; }
.overlay .title { font-size: 36px; color: #e94560; margin-bottom: 10px; }
.overlay .subtitle { font-size: 16px; color: #ccc; margin-bottom: 30px; }
.overlay .over-score { font-size: 22px; color: #0f0; margin-bottom: 6px; }
.overlay .over-level { font-size: 14px; color: #aaa; margin-bottom: 20px; }
.overlay .over-leaderboard { width: 260px; margin-bottom: 20px; }
.overlay .over-leaderboard h4 {
    text-align: center; color: #e94560; margin-bottom: 8px; font-size: 15px;
}
.overlay .over-leaderboard ol {
    list-style: none; font-size: 13px;
}
.overlay .over-leaderboard ol li {
    display: flex; justify-content: space-between;
    padding: 4px 10px; margin: 2px 0;
    background: rgba(255,255,255,0.08); border-radius: 4px;
}
.overlay .over-leaderboard ol li:nth-child(1) { color: #ffd700; }
.overlay .over-leaderboard ol li:nth-child(2) { color: #c0c0c0; }
.overlay .over-leaderboard ol li:nth-child(3) { color: #cd7f32; }
.btn {
    padding: 10px 30px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
}
.btn-start { background: #e94560; color: #fff; }
.btn-start:hover { background: #c73a52; }
.btn-restart { background: #0f3460; color: #fff; margin-bottom: 8px; }
.btn-restart:hover { background: #1a4a7a; }
.overlay .hint { font-size: 12px; color: #666; margin-top: 12px; }

/* ========== 虚拟方向键 ========== */
.dpad {
    display: none;           /* 桌面端默认隐藏 */
    margin-top: 16px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
.dpad-grid {
    display: grid;
    grid-template-columns: 70px 70px 70px;
    grid-template-rows: 70px 70px 70px;
    gap: 4px;
    justify-content: center;
}
.dpad-btn {
    width: 70px;
    height: 70px;
    border: 2px solid #444;
    border-radius: 10px;
    background: #1a1a3e;
    color: #ccc;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}
.dpad-btn:active,
.dpad-btn.active {
    background: #e94560;
    color: #fff;
    transform: scale(0.92);
    border-color: #e94560;
}
.dpad-empty { background: transparent; border: none; pointer-events: none; }

/* darshan-grid 定位 */
.dpad-up    { grid-column: 2; grid-row: 1; }
.dpad-left  { grid-column: 1; grid-row: 2; }
.dpad-center{ grid-column: 2; grid-row: 2; }
.dpad-right { grid-column: 3; grid-row: 2; }
.dpad-down  { grid-column: 2; grid-row: 3; }

/* ========== 手机端响应式 ========== */
@media (max-width: 768px) {
    .game-wrapper {
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 8px;
    }
    .game-container {
        max-width: 95vw;
        border-width: 2px;
    }
    canvas {
        max-width: 100%;
        height: auto;
    }
    .sidebar {
        width: 100%;
        max-width: 95vw;
        min-width: auto;
        padding: 14px;
        order: 1;  /* 信息面板放到最上面 */
    }
    .sidebar h3 {
        font-size: 15px;
        margin-bottom: 8px;
        padding-bottom: 5px;
    }
    .sidebar .score-box {
        font-size: 22px;
        margin-bottom: 4px;
    }
    .sidebar .level-box {
        font-size: 12px;
        margin-bottom: 10px;
    }
    .sidebar .leaderboard-list li {
        padding: 4px 6px;
        font-size: 11px;
    }
    .controls-hint { display: none; }
    .dpad { display: block; }
    .overlay .title { font-size: 26px; }
    .overlay .subtitle { font-size: 14px; margin-bottom: 20px; }
    .overlay .over-score { font-size: 18px; }
    .overlay .over-level { font-size: 13px; }
    .overlay .over-leaderboard { width: 220px; }
    .btn { padding: 8px 24px; font-size: 14px; }
}

/* 超小屏进一步缩小 d-pad */
@media (max-width: 380px) {
    .dpad-grid {
        grid-template-columns: 55px 55px 55px;
        grid-template-rows: 55px 55px 55px;
        gap: 3px;
    }
    .dpad-btn {
        width: 55px;
        height: 55px;
        font-size: 20px;
    }
}
</style>
</head>
<body>

<div class="game-wrapper">
    <!-- 手机端信息面板（通过 order 在手机上放最上面） -->
    <div class="sidebar">
        <h3>📊 游戏信息</h3>
        <div class="score-box" id="sidebarScore">0</div>
        <div class="level-box">等级: <span id="sidebarLevel">1</span></div>
        <h3>🏆 排行榜</h3>
        <ul class="leaderboard-list" id="sidebarLeaderboard">
            <li class="leaderboard-empty">暂无记录</li>
        </ul>
        <div class="controls-hint">↑↓←→ 控制方向</div>
    </div>

    <div class="game-container" id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- 开始覆盖层 -->
        <div class="overlay" id="startOverlay">
            <div class="title">🐍 贪吃蛇</div>
            <div class="subtitle">使用方向键 / 虚拟按键控制蛇的移动</div>
            <button class="btn btn-start" id="btnStart">开始游戏</button>
        </div>

        <!-- 结束覆盖层 -->
        <div class="overlay hidden" id="gameOverOverlay">
            <div class="title">游戏结束！</div>
            <div class="over-score" id="overScore">最终分数: 0</div>
            <div class="over-level" id="overLevel">等级: 1</div>
            <div class="over-leaderboard">
                <h4>🏆 排行榜 TOP5</h4>
                <ol id="overLeaderboard"></ol>
            </div>
            <button class="btn btn-restart" id="btnRestart">🔄 重新开始 (R)</button>
            <div class="hint">按 R 键重新开始</div>
        </div>
    </div>

    <!-- 虚拟方向键 -->
    <div class="dpad" id="dpad">
        <div class="dpad-grid">
            <button class="dpad-btn dpad-up"    data-dir="up">▲</button>
            <button class="dpad-btn dpad-left"  data-dir="left">◀</button>
            <button class="dpad-btn dpad-empty dpad-center"></button>
            <button class="dpad-btn dpad-right" data-dir="right">▶</button>
            <button class="dpad-btn dpad-down"  data-dir="down">▼</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ==================== 游戏配置 ====================
    const WIDTH = 640;
    const HEIGHT = 480;
    const CELL_SIZE = 20;
    const COLS = WIDTH / CELL_SIZE;  // 32
    const ROWS = HEIGHT / CELL_SIZE; // 24
    const LEADERBOARD_KEY = 'snake_leaderboard_v2';

    // ==================== DOM 元素 ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const overScoreEl = document.getElementById('overScore');
    const overLevelEl = document.getElementById('overLevel');
    const overLeaderboardEl = document.getElementById('overLeaderboard');
    const sidebarScoreEl = document.getElementById('sidebarScore');
    const sidebarLevelEl = document.getElementById('sidebarLevel');
    const sidebarLeaderboardEl = document.getElementById('sidebarLeaderboard');
    const dpad = document.getElementById('dpad');

    // ==================== 游戏状态 ====================
    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let score = 0;
    let speed = 10;        // 初始帧率（对应 pygame 中的 speed=10）
    let gameLoop = null;
    let gameRunning = false;
    let gameStarted = false;
    let animationId = null;

    // ==================== 排行榜 ====================
    function loadLeaderboard() {
        try {
            const data = localStorage.getItem(LEADERBOARD_KEY);
            if (!data) return [];
            const parsed = JSON.parse(data);
            return parsed.sort((a, b) => b.score - a.score).slice(0, 5);
        } catch (e) {
            return [];
        }
    }

    function saveLeaderboard(leaderboard) {
        const sorted = leaderboard.sort((a, b) => b.score - a.score).slice(0, 5);
        localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(sorted));
    }

    function addToLeaderboard(score, level) {
        const leaderboard = loadLeaderboard();
        leaderboard.push({ score, level });
        saveLeaderboard(leaderboard);
    }

    // ==================== 方向设置（统一入口，含反向防呆） ====================
    function setDirection(dx, dy) {
        if (!gameRunning) return;
        // 防止反向移动
        if (dx !== 0) {
            // 水平移动时，当前方向不能反向
            if (direction.x === -dx) return;
        } else {
            // 垂直移动时，当前方向不能反向
            if (direction.y === -dy) return;
        }
        nextDirection = { x: dx, y: dy };
    }

    // ==================== UI 更新 ====================
    function updateSidebar() {
        const level = speed - 9;
        sidebarScoreEl.textContent = score;
        sidebarLevelEl.textContent = level;

        const leaderboard = loadLeaderboard();
        sidebarLeaderboardEl.innerHTML = '';
        if (leaderboard.length === 0) {
            sidebarLeaderboardEl.innerHTML = '<li class="leaderboard-empty">暂无记录</li>';
        } else {
            leaderboard.forEach((entry, i) => {
                const li = document.createElement('li');
                li.innerHTML = '<span>' + (i + 1) + '. ' + entry.score + '分</span><span>Lv' + entry.level + '</span>';
                sidebarLeaderboardEl.appendChild(li);
            });
        }
    }

    function showGameOverOverlay() {
        const level = speed - 9;
        overScoreEl.textContent = '最终分数: ' + score;
        overLevelEl.textContent = '等级: ' + level;

        const leaderboard = loadLeaderboard();
        overLeaderboardEl.innerHTML = '';
        if (leaderboard.length === 0) {
            overLeaderboardEl.innerHTML = '<li style="padding:10px;text-align:center;color:#666;">暂无记录</li>';
        } else {
            leaderboard.forEach((entry, i) => {
                const li = document.createElement('li');
                li.innerHTML = '<span>' + (i + 1) + '. ' + entry.score + '分</span><span>等级' + entry.level + '</span>';
                overLeaderboardEl.appendChild(li);
            });
        }

        gameOverOverlay.classList.remove('hidden');
    }

    function hideOverlays() {
        startOverlay.classList.add('hidden');
        gameOverOverlay.classList.add('hidden');
    }

    // ==================== 食物生成 ====================
    function generateFood() {
        while (true) {
            const x = Math.floor(Math.random() * COLS) * CELL_SIZE;
            const y = Math.floor(Math.random() * ROWS) * CELL_SIZE;
            const pos = { x, y };
            if (!snake.some(function(seg) { return seg.x === x && seg.y === y; })) {
                return pos;
            }
        }
    }

    // ==================== 绘制 ====================
    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.strokeStyle = '#111';
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= WIDTH; x += CELL_SIZE) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, HEIGHT);
            ctx.stroke();
        }
        for (let y = 0; y <= HEIGHT; y += CELL_SIZE) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(WIDTH, y);
            ctx.stroke();
        }

        snake.forEach(function(seg, i) {
            ctx.fillStyle = (i === 0) ? '#0f0' : '#00f';
            ctx.fillRect(seg.x + 1, seg.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
        });

        ctx.fillStyle = '#f00';
        ctx.fillRect(food.x + 1, food.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
    }

    // ==================== 游戏循环 ====================
    let lastTime = 0;

    function loop(timestamp) {
        if (!gameRunning) return;

        if (!lastTime) lastTime = timestamp;
        const interval = 1000 / speed;

        if (timestamp - lastTime >= interval) {
            lastTime = timestamp;
            update();
        }

        draw();
        animationId = requestAnimationFrame(loop);
    }

    function update() {
        direction = { x: nextDirection.x, y: nextDirection.y };

        const head = snake[0];
        const newHead = {
            x: head.x + direction.x * CELL_SIZE,
            y: head.y + direction.y * CELL_SIZE
        };

        if (newHead.x < 0 || newHead.x >= WIDTH || newHead.y < 0 || newHead.y >= HEIGHT) {
            endGame();
            return;
        }

        if (snake.some(function(seg) { return seg.x === newHead.x && seg.y === newHead.y; })) {
            endGame();
            return;
        }

        snake.unshift(newHead);

        if (newHead.x === food.x && newHead.y === food.y) {
            score += 10;
            speed = Math.min(speed + 1, 25);
            food = generateFood();
            updateSidebar();
        } else {
            snake.pop();
        }
    }

    function endGame() {
        gameRunning = false;
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        lastTime = 0;

        const level = speed - 9;
        addToLeaderboard(score, level);
        updateSidebar();
        showGameOverOverlay();
    }

    // ==================== 游戏初始化 ====================
    function initGame() {
        const startX = Math.floor(COLS / 2) * CELL_SIZE;
        const startY = Math.floor(ROWS / 2) * CELL_SIZE;
        snake = [
            { x: startX, y: startY },
            { x: startX - CELL_SIZE, y: startY },
            { x: startX - 2 * CELL_SIZE, y: startY }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        speed = 10;
        food = generateFood();
        gameRunning = true;
        gameStarted = true;
        lastTime = 0;

        updateSidebar();
        hideOverlays();
        draw();

        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
    }

    // ==================== 键盘事件 ====================
    document.addEventListener('keydown', function(e) {
        if (!gameRunning) {
            if (e.key === 'r' || e.key === 'R') {
                if (!startOverlay.classList.contains('hidden') || !gameOverOverlay.classList.contains('hidden')) {
                    if (gameStarted) {
                        initGame();
                    }
                }
            }
            return;
        }

        switch (e.key) {
            case 'ArrowUp':    case 'w': case 'W': setDirection(0, -1); e.preventDefault(); break;
            case 'ArrowDown':  case 's': case 'S': setDirection(0,  1); e.preventDefault(); break;
            case 'ArrowLeft':  case 'a': case 'A': setDirection(-1, 0); e.preventDefault(); break;
            case 'ArrowRight': case 'd': case 'D': setDirection(1,  0); e.preventDefault(); break;
        }
    });

    // ==================== 虚拟方向键事件（pointer 同时支持触摸和鼠标） ====================
    dpad.querySelectorAll('.dpad-btn[data-dir]').forEach(function(btn) {
        btn.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            e.stopPropagation();
            btn.classList.add('active');
            const dir = btn.getAttribute('data-dir');
            switch (dir) {
                case 'up':    setDirection(0, -1); break;
                case 'down':  setDirection(0,  1); break;
                case 'left':  setDirection(-1, 0); break;
                case 'right': setDirection(1,  0); break;
            }
        });

        btn.addEventListener('pointerup', function(e) {
            e.preventDefault();
            btn.classList.remove('active');
        });

        btn.addEventListener('pointerleave', function(e) {
            btn.classList.remove('active');
        });

        btn.addEventListener('pointercancel', function(e) {
            btn.classList.remove('active');
        });
    });

    // 防止 d-pad 区域触发页面滚动
    dpad.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, { passive: false });

    // ==================== 画布自适应 ====================
    function resizeCanvas() {
        if (window.innerWidth <= 768) {
            // 手机端：缩放 canvas 显示尺寸以适配屏幕
            const padding = 16;
            const maxDisplayWidth = Math.min(window.innerWidth - padding, 640);
            const scale = maxDisplayWidth / WIDTH;
            canvas.style.width = maxDisplayWidth + 'px';
            canvas.style.height = (HEIGHT * scale) + 'px';
        } else {
            // 桌面端：保持原始尺寸
            canvas.style.width = '';
            canvas.style.height = '';
        }
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ==================== 按钮事件 ====================
    document.getElementById('btnStart').addEventListener('click', initGame);
    document.getElementById('btnRestart').addEventListener('click', initGame);

    // ==================== 初始渲染 ====================
    updateSidebar();
    draw();
})();
</script>
</body>
</html>
