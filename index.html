<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "Microsoft YaHei", "SimHei", "PingFang SC", Arial, sans-serif;
}
.game-wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
}
.game-container {
    position: relative;
    background: #000;
    border: 3px solid #333;
    border-radius: 8px;
    overflow: hidden;
}
canvas { display: block; }
.sidebar {
    background: #16213e;
    border-radius: 8px;
    padding: 20px;
    color: #fff;
    min-width: 200px;
}
.sidebar h3 {
    text-align: center;
    margin-bottom: 12px;
    color: #e94560;
    font-size: 18px;
    border-bottom: 1px solid #333;
    padding-bottom: 8px;
}
.sidebar .score-box {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #0f0;
    margin-bottom: 8px;
}
.sidebar .level-box {
    text-align: center;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 16px;
}
.sidebar .leaderboard-list {
    list-style: none;
}
.sidebar .leaderboard-list li {
    display: flex;
    justify-content: space-between;
    padding: 6px 8px;
    margin: 3px 0;
    background: #0f3460;
    border-radius: 4px;
    font-size: 13px;
}
.sidebar .leaderboard-list li:nth-child(1) { color: #ffd700; }
.sidebar .leaderboard-list li:nth-child(2) { color: #c0c0c0; }
.sidebar .leaderboard-list li:nth-child(3) { color: #cd7f32; }
.sidebar .leaderboard-empty {
    text-align: center;
    color: #666;
    font-size: 13px;
    padding: 20px 0;
}
.controls-hint {
    margin-top: 16px;
    font-size: 12px;
    color: #666;
    text-align: center;
}
.overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
}
.overlay.hidden { display: none; }
.overlay .title { font-size: 36px; color: #e94560; margin-bottom: 10px; }
.overlay .subtitle { font-size: 16px; color: #ccc; margin-bottom: 30px; }
.overlay .over-score { font-size: 22px; color: #0f0; margin-bottom: 6px; }
.overlay .over-level { font-size: 14px; color: #aaa; margin-bottom: 20px; }
.overlay .over-leaderboard { width: 260px; margin-bottom: 20px; }
.overlay .over-leaderboard h4 {
    text-align: center; color: #e94560; margin-bottom: 8px; font-size: 15px;
}
.overlay .over-leaderboard ol {
    list-style: none; font-size: 13px;
}
.overlay .over-leaderboard ol li {
    display: flex; justify-content: space-between;
    padding: 4px 10px; margin: 2px 0;
    background: rgba(255,255,255,0.08); border-radius: 4px;
}
.overlay .over-leaderboard ol li:nth-child(1) { color: #ffd700; }
.overlay .over-leaderboard ol li:nth-child(2) { color: #c0c0c0; }
.overlay .over-leaderboard ol li:nth-child(3) { color: #cd7f32; }
.btn {
    padding: 10px 30px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
}
.btn-start { background: #e94560; color: #fff; }
.btn-start:hover { background: #c73a52; }
.btn-restart { background: #0f3460; color: #fff; margin-bottom: 8px; }
.btn-restart:hover { background: #1a4a7a; }
.overlay .hint { font-size: 12px; color: #666; margin-top: 12px; }
</style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-container" id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- 开始覆盖层 -->
        <div class="overlay" id="startOverlay">
            <div class="title">🐍 贪吃蛇</div>
            <div class="subtitle">使用方向键控制蛇的移动</div>
            <button class="btn btn-start" id="btnStart">开始游戏</button>
        </div>

        <!-- 结束覆盖层 -->
        <div class="overlay hidden" id="gameOverOverlay">
            <div class="title">游戏结束！</div>
            <div class="over-score" id="overScore">最终分数: 0</div>
            <div class="over-level" id="overLevel">等级: 1</div>
            <div class="over-leaderboard">
                <h4>🏆 排行榜 TOP5</h4>
                <ol id="overLeaderboard"></ol>
            </div>
            <button class="btn btn-restart" id="btnRestart">🔄 重新开始 (R)</button>
            <div class="hint">按 R 键重新开始</div>
        </div>
    </div>

    <div class="sidebar">
        <h3>📊 游戏信息</h3>
        <div class="score-box" id="sidebarScore">0</div>
        <div class="level-box">等级: <span id="sidebarLevel">1</span></div>
        <h3>🏆 排行榜</h3>
        <ul class="leaderboard-list" id="sidebarLeaderboard">
            <li class="leaderboard-empty">暂无记录</li>
        </ul>
        <div class="controls-hint">↑↓←→ 控制方向</div>
    </div>
</div>

<script>
(function() {
    // ==================== 游戏配置 ====================
    const WIDTH = 640;
    const HEIGHT = 480;
    const CELL_SIZE = 20;
    const COLS = WIDTH / CELL_SIZE;  // 32
    const ROWS = HEIGHT / CELL_SIZE; // 24
    const LEADERBOARD_KEY = 'snake_leaderboard_v2';

    // ==================== DOM 元素 ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const overScoreEl = document.getElementById('overScore');
    const overLevelEl = document.getElementById('overLevel');
    const overLeaderboardEl = document.getElementById('overLeaderboard');
    const sidebarScoreEl = document.getElementById('sidebarScore');
    const sidebarLevelEl = document.getElementById('sidebarLevel');
    const sidebarLeaderboardEl = document.getElementById('sidebarLeaderboard');

    // ==================== 游戏状态 ====================
    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let score = 0;
    let speed = 10;        // 初始帧率（对应 pygame 中的 speed=10）
    let gameLoop = null;
    let gameRunning = false;
    let gameStarted = false;
    let animationId = null;

    // ==================== 排行榜 ====================
    function loadLeaderboard() {
        try {
            const data = localStorage.getItem(LEADERBOARD_KEY);
            if (!data) return [];
            const parsed = JSON.parse(data);
            return parsed.sort((a, b) => b.score - a.score).slice(0, 5);
        } catch (e) {
            return [];
        }
    }

    function saveLeaderboard(leaderboard) {
        const sorted = leaderboard.sort((a, b) => b.score - a.score).slice(0, 5);
        localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(sorted));
    }

    function addToLeaderboard(score, level) {
        const leaderboard = loadLeaderboard();
        leaderboard.push({ score, level });
        saveLeaderboard(leaderboard);
    }

    // ==================== UI 更新 ====================
    function updateSidebar() {
        const level = speed - 9;
        sidebarScoreEl.textContent = score;
        sidebarLevelEl.textContent = level;

        const leaderboard = loadLeaderboard();
        sidebarLeaderboardEl.innerHTML = '';
        if (leaderboard.length === 0) {
            sidebarLeaderboardEl.innerHTML = '<li class="leaderboard-empty">暂无记录</li>';
        } else {
            leaderboard.forEach((entry, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${i + 1}. ${entry.score}分</span><span>Lv${entry.level}</span>`;
                sidebarLeaderboardEl.appendChild(li);
            });
        }
    }

    function showGameOverOverlay() {
        const level = speed - 9;
        overScoreEl.textContent = `最终分数: ${score}`;
        overLevelEl.textContent = `等级: ${level}`;

        const leaderboard = loadLeaderboard();
        overLeaderboardEl.innerHTML = '';
        if (leaderboard.length === 0) {
            overLeaderboardEl.innerHTML = '<li style="padding:10px;text-align:center;color:#666;">暂无记录</li>';
        } else {
            leaderboard.forEach((entry, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${i + 1}. ${entry.score}分</span><span>等级${entry.level}</span>`;
                overLeaderboardEl.appendChild(li);
            });
        }

        gameOverOverlay.classList.remove('hidden');
    }

    function hideOverlays() {
        startOverlay.classList.add('hidden');
        gameOverOverlay.classList.add('hidden');
    }

    // ==================== 食物生成 ====================
    function generateFood() {
        while (true) {
            const x = Math.floor(Math.random() * COLS) * CELL_SIZE;
            const y = Math.floor(Math.random() * ROWS) * CELL_SIZE;
            const pos = { x, y };
            // 检查不在蛇身上
            if (!snake.some(seg => seg.x === x && seg.y === y)) {
                return pos;
            }
        }
    }

    // ==================== 绘制 ====================
    function draw() {
        // 背景
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        // 绘制网格线（可选，使画面更清晰）
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= WIDTH; x += CELL_SIZE) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, HEIGHT);
            ctx.stroke();
        }
        for (let y = 0; y <= HEIGHT; y += CELL_SIZE) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(WIDTH, y);
            ctx.stroke();
        }

        // 画蛇
        snake.forEach((seg, i) => {
            ctx.fillStyle = (i === 0) ? '#0f0' : '#00f'; // 头绿身蓝
            ctx.fillRect(seg.x + 1, seg.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
        });

        // 画食物
        ctx.fillStyle = '#f00';
        ctx.fillRect(food.x + 1, food.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
    }

    // ==================== 游戏循环 ====================
    let lastTime = 0;

    function loop(timestamp) {
        if (!gameRunning) return;

        // 控制帧率
        if (!lastTime) lastTime = timestamp;
        const interval = 1000 / speed; // 毫秒

        if (timestamp - lastTime >= interval) {
            lastTime = timestamp;
            update();
        }

        draw();
        animationId = requestAnimationFrame(loop);
    }

    function update() {
        // 应用方向
        direction = { ...nextDirection };

        // 移动蛇头
        const head = snake[0];
        const newHead = {
            x: head.x + direction.x * CELL_SIZE,
            y: head.y + direction.y * CELL_SIZE
        };

        // 碰撞检测：撞墙
        if (newHead.x < 0 || newHead.x >= WIDTH || newHead.y < 0 || newHead.y >= HEIGHT) {
            endGame();
            return;
        }

        // 碰撞检测：撞自己
        if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
            endGame();
            return;
        }

        // 插入新头部
        snake.unshift(newHead);

        // 判断是否吃到食物
        if (newHead.x === food.x && newHead.y === food.y) {
            score += 10;
            speed = Math.min(speed + 1, 25); // 加速，上限25
            food = generateFood();
            updateSidebar();
        } else {
            snake.pop(); // 没吃到去掉尾巴
        }
    }

    function endGame() {
        gameRunning = false;
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        lastTime = 0;

        const level = speed - 9;
        addToLeaderboard(score, level);
        updateSidebar();
        showGameOverOverlay();
    }

    // ==================== 游戏初始化 ====================
    function initGame() {
        // 初始蛇：长度3，水平居中
        const startX = Math.floor(COLS / 2) * CELL_SIZE;
        const startY = Math.floor(ROWS / 2) * CELL_SIZE;
        snake = [
            { x: startX, y: startY },
            { x: startX - CELL_SIZE, y: startY },
            { x: startX - 2 * CELL_SIZE, y: startY }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        speed = 10;
        food = generateFood();
        gameRunning = true;
        gameStarted = true;
        lastTime = 0;

        updateSidebar();
        hideOverlays();
        draw();

        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
    }

    // ==================== 事件处理 ====================
    document.addEventListener('keydown', function(e) {
        if (!gameRunning) {
            // 游戏结束界面按 R 重新开始
            if (e.key === 'r' || e.key === 'R') {
                if (!startOverlay.classList.contains('hidden') || !gameOverOverlay.classList.contains('hidden')) {
                    // 如果还没有开始过，点开始按钮；否则重新开始
                    if (gameStarted) {
                        initGame();
                    }
                }
            }
            return;
        }

        switch (e.key) {
            case 'ArrowUp':
            case 'w':
            case 'W':
                if (direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 };
                }
                e.preventDefault();
                break;
            case 'ArrowDown':
            case 's':
            case 'S':
                if (direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 };
                }
                e.preventDefault();
                break;
            case 'ArrowLeft':
            case 'a':
            case 'A':
                if (direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 };
                }
                e.preventDefault();
                break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                if (direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 };
                }
                e.preventDefault();
                break;
        }
    });

    document.getElementById('btnStart').addEventListener('click', initGame);
    document.getElementById('btnRestart').addEventListener('click', initGame);

    // ==================== 初始渲染 ====================
    updateSidebar();
    draw();
})();
</script>
</body>
</html>
